<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Input Laporan Proyek</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="firebase-config.js"></script>
  <script src="app-input.js" defer></script>
</head>
<body>
  <h1>Form Laporan Harian Proyek</h1>
  <form id="dailyReportForm">
    <input type="text" id="projectName" placeholder="Nama Proyek" required>
    <input type="text" id="location" placeholder="Lokasi" required>
    <textarea id="activityDesc" placeholder="Uraian Aktivitas"></textarea>
    <input type="number" id="planned" placeholder="Rencana (%)">
    <input type="number" id="actual" placeholder="Realisasi (%)">
    <textarea id="issues" placeholder="Permasalahan"></textarea>
    <textarea id="followUp" placeholder="Rencana Tindak Lanjut"></textarea>
    <button type="submit">Simpan Laporan</button>
  </form>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>
</body>
</html>
